<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0A6B55">
<title>Recursos Telefónicos España</title>
<script>var _n=()=>{};window.console={log:_n,warn:_n,error:_n,info:_n,debug:_n};</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<style>
/* ── RESET ── */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --g1:#0A6B55;--g2:#0E9470;--g3:#12B98B;--g4:#4DD6A8;
  --gg:linear-gradient(135deg,#0A6B55,#0E9470 60%,#12B98B);
  --gp:#E5F7F1;--gl:#C8EFE0;
  --s:#fff;--s2:#F7FAF8;--s3:#EFF4F1;--s4:#E5ECE8;--bg:#ECF0EE;
  --bd:rgba(0,0,0,.08);--bd2:rgba(0,0,0,.13);
  --t1:#0F1A15;--t2:#3A4D44;--t3:#7A9088;--t4:#AABBB4;
  --red:#C93028;--redbg:#FDEEEC;
  --blue:#1A6FD4;--bluebg:#EBF3FE;
  --ora:#C4620C;--orabg:#FEF4EB;
  --pur:#7B3FB0;--purbg:#F4EDFC;
  --amb:#A87010;--ambbg:#FEF8E6;
  --sh1:0 2px 8px rgba(0,0,0,.07),0 1px 3px rgba(0,0,0,.04);
  --sh2:0 8px 24px rgba(0,0,0,.09),0 2px 8px rgba(0,0,0,.05);
  --shg:0 8px 28px rgba(10,107,85,.28),0 2px 8px rgba(10,107,85,.14);
  --r1:8px;--r2:14px;--r3:20px;
  --ease:cubic-bezier(.25,.46,.45,.94);
  --spring:cubic-bezier(.34,1.56,.64,1);
  /* ── Mobile sheet heights ── */
  --mbar:52px;  /* mobile bottom bar */
  --sb-peek:68px; /* sidebar peek amount */
}
html,body{height:100%;overflow:hidden;background:var(--bg);
  font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
  font-size:13px;color:var(--t1);-webkit-font-smoothing:antialiased}

/* ── APP SHELL ── */
#app{
  height:100dvh;          /* dvh = dynamic viewport, collapses with mobile browser chrome */
  display:flex;flex-direction:column;overflow:hidden;
}

/* ── HEADER ── */
#header{
  height:56px;min-height:56px;flex-shrink:0;
  display:flex;align-items:center;gap:14px;padding:0 18px;
  background:rgba(255,255,255,.92);backdrop-filter:blur(24px);
  border-bottom:1px solid var(--bd);box-shadow:var(--sh1);z-index:200;
}
.logo{display:flex;align-items:center;gap:11px;flex-shrink:0}
.logo-mark{
  width:36px;height:36px;border-radius:11px;flex-shrink:0;
  background:var(--gg);display:flex;align-items:center;justify-content:center;
  box-shadow:var(--shg);position:relative;overflow:hidden;
}
.logo-mark::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.22),transparent 55%)}
.logo-mark svg{width:18px;height:18px;stroke:#fff;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round;position:relative;z-index:1}
.logo-name{font-size:14.5px;font-weight:800;letter-spacing:-.04em;color:var(--t1);line-height:1}
.logo-sub{margin-top:2px;font-size:10px;color:var(--t3);font-weight:500}
.hd-sep{width:1px;height:22px;background:var(--bd2)}
.search-wrap{position:relative;flex:1;max-width:380px;display:flex;align-items:center}
.search-wrap svg{position:absolute;left:11px;width:14px;height:14px;stroke:var(--t3);fill:none;stroke-width:2;stroke-linecap:round;pointer-events:none}
#global-search{
  width:100%;height:36px;padding:0 13px 0 34px;
  border:1px solid var(--bd2);border-radius:99px;
  background:rgba(255,255,255,.8);font-family:inherit;font-size:13px;color:var(--t1);outline:none;
  transition:all .18s var(--ease);
}
#global-search::placeholder{color:var(--t4)}
#global-search:focus{background:#fff;border-color:var(--g2);box-shadow:0 0 0 3px rgba(14,148,112,.12)}
.hd-stats{margin-left:auto;display:flex;gap:6px}
.stat-pill{
  display:flex;align-items:center;gap:5px;padding:4px 10px;
  border-radius:99px;background:rgba(255,255,255,.9);border:1px solid var(--bd);
}
.stat-n{font-size:15px;font-weight:900;color:var(--g1);letter-spacing:-.04em;line-height:1}
.stat-sep{width:1px;height:13px;background:var(--bd2)}
.stat-l{font-size:8.5px;text-transform:uppercase;letter-spacing:.09em;color:var(--t3);font-weight:700}
#saved-badge{
  display:flex;align-items:center;gap:5px;padding:5px 11px;border-radius:99px;
  background:var(--gp);color:var(--g1);border:1px solid rgba(14,148,112,.2);
  font-weight:700;font-size:11px;flex-shrink:0;
  opacity:0;transform:translateY(-4px) scale(.96);
  transition:opacity .2s,transform .2s var(--spring);
}
#saved-badge.show{opacity:1;transform:none}
#saved-badge svg{width:10px;height:10px;stroke:var(--g1);fill:none;stroke-width:2.5;stroke-linecap:round}

/* ── MAIN AREA ── */
#main{
  flex:1;min-height:0;
  display:flex;position:relative;overflow:hidden;
}

/* ── SIDEBAR ── */
#sidebar{
  width:300px;min-width:300px;flex-shrink:0;
  display:flex;flex-direction:column;
  background:rgba(255,255,255,.95);backdrop-filter:blur(18px);
  border-right:1px solid var(--bd);overflow:hidden;z-index:20;
}
#sidebar.hidden{display:none}
.sb-header{padding:11px 12px 9px;border-bottom:1px solid rgba(0,0,0,.05);flex-shrink:0}
.sb-inp-wrap{position:relative;display:flex;align-items:center}
.sb-inp-wrap svg{position:absolute;left:10px;width:13px;height:13px;stroke:var(--t3);fill:none;stroke-width:2;pointer-events:none}
.sb-search{
  width:100%;height:33px;padding:0 10px 0 30px;
  border:1px solid var(--bd2);border-radius:10px;
  background:var(--s2);font-family:inherit;font-size:12.5px;color:var(--t1);outline:none;
}
.sb-search:focus{background:#fff;border-color:var(--g2)}
.sb-search::placeholder{color:var(--t4)}
.sb-section{padding:10px 13px 4px;font-size:9px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--t4)}
#province-list{flex:1;overflow-y:auto;min-height:0;padding:4px 7px 10px}
#province-list::-webkit-scrollbar{width:3px}
#province-list::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:99px}
.prov-item{
  display:flex;align-items:center;gap:9px;padding:9px 9px;margin:2px 0;
  cursor:pointer;border-radius:12px;border:1px solid transparent;
  transition:all .14s var(--ease);user-select:none;
}
.prov-item:hover{background:var(--s2);border-color:var(--bd)}
.prov-item:active{transform:scale(.98)}
.prov-item.active{background:linear-gradient(135deg,rgba(200,239,224,.5),rgba(255,255,255,.9));border-color:rgba(14,148,112,.24);box-shadow:var(--sh1)}
.prov-dot{width:7px;height:7px;border-radius:99px;background:var(--bd2);flex-shrink:0;transition:all .18s}
.prov-item.active .prov-dot,.prov-item.nacionales .prov-dot{background:var(--g2);box-shadow:0 0 0 3px rgba(14,148,112,.2)}
.prov-name{flex:1;font-size:13px;font-weight:500;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.prov-item.active .prov-name{color:var(--g1);font-weight:700}
.prov-count{padding:2px 7px;border-radius:99px;background:var(--s3);color:var(--t3);font-size:10px;font-weight:700;flex-shrink:0}
.prov-item.active .prov-count{background:var(--g1);color:#fff}

/* ── RESOURCE PANEL (desktop) ── */
#res-panel{
  /* On desktop: absolute within #main, top to bottom */
  position:absolute;top:0;left:0;bottom:0;
  width:300px;
  display:none;
  grid-template-rows:auto 1fr;
  background:rgba(255,255,255,.95);backdrop-filter:blur(18px);
  border-right:1px solid var(--bd);box-shadow:2px 0 12px rgba(0,0,0,.07);
  z-index:20;overflow:hidden;
}
#res-panel.visible{display:grid;animation:panelIn .24s var(--ease) both}
@keyframes panelIn{from{transform:translateX(-12px);opacity:0}to{transform:none;opacity:1}}

.rp-header{padding:12px 13px 10px;border-bottom:1px solid rgba(0,0,0,.05);flex-shrink:0}
.rp-top{display:flex;align-items:center;gap:9px;margin-bottom:8px}
.btn-back{
  width:32px;height:32px;border-radius:10px;flex-shrink:0;
  border:1px solid var(--bd2);background:var(--s2);
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  transition:all .14s var(--ease);
}
.btn-back:hover{background:var(--gp);border-color:rgba(14,148,112,.3)}
.btn-back svg{width:13px;height:13px;stroke:var(--t2);fill:none;stroke-width:2.3;stroke-linecap:round}
.rp-title{flex:1;font-size:15px;font-weight:800;letter-spacing:-.03em;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
#rp-cats{display:flex;flex-wrap:wrap;gap:4px}
.cat-tag{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:99px;font-size:9px;font-weight:700}
.cat-health{background:var(--bluebg);color:var(--blue)}
.cat-fire{background:var(--redbg);color:var(--red)}
.cat-police{background:#EEF1F8;color:#2D4A8A}
.cat-social{background:var(--orabg);color:var(--ora)}
.cat-legal{background:var(--purbg);color:var(--pur)}
.cat-crisis{background:var(--ambbg);color:var(--amb)}
.cat-default{background:var(--s3);color:var(--t3)}

/* Resource list */
#res-list{
  overflow-y:scroll;-webkit-overflow-scrolling:touch;
  min-height:0;padding:8px 9px 20px;
}
#res-list::-webkit-scrollbar{width:4px}
#res-list::-webkit-scrollbar-thumb{background:var(--g4);border-radius:99px}

/* Resource cards */
.rc{
  margin-bottom:5px;border-radius:13px;
  background:#fff;border:1px solid var(--bd);box-shadow:var(--sh1);
  overflow:hidden;position:relative;
  animation:cardIn .2s var(--ease) both;
}
@keyframes cardIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
.rc::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--bd2);border-radius:0 2px 2px 0}
.rc.c-health::before{background:var(--blue)}
.rc.c-fire::before{background:var(--red)}
.rc.c-police::before{background:#2D4A8A}
.rc.c-social::before{background:var(--ora)}
.rc.c-legal::before{background:var(--pur)}
.rc.c-crisis::before{background:var(--amb)}
.rc.c-default::before{background:var(--g2)}
.rc-inner{padding:8px 10px 7px 13px}
.rc-row{display:flex;align-items:flex-start;gap:8px}
.rc-ico{width:26px;height:26px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;margin-top:1px}
.rc-ico.c-health{background:var(--bluebg)}.rc-ico.c-fire{background:var(--redbg)}.rc-ico.c-police{background:#EEF1F8}
.rc-ico.c-social{background:var(--orabg)}.rc-ico.c-legal{background:var(--purbg)}.rc-ico.c-crisis{background:var(--ambbg)}.rc-ico.c-default{background:var(--gp)}
.rc-body{flex:1;min-width:0}
.rc-name{font-size:12px;font-weight:600;color:var(--t1);line-height:1.35;word-break:break-word}
.rc-phone{
  display:inline-flex;align-items:center;gap:4px;
  margin-top:3px;padding:3px 8px;border-radius:7px;
  background:var(--gp);color:var(--g1);
  font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;line-height:1.3;
}
.rc-phone::before{content:'📞';font-family:sans-serif;font-size:9px}
.rc-desc{margin-top:3px;font-size:10.5px;color:var(--t3);line-height:1.4}

.empty-state{padding:48px 20px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:12px}
.empty-ico{width:52px;height:52px;border-radius:16px;background:var(--s3);display:flex;align-items:center;justify-content:center;font-size:24px}
.empty-t{font-size:12.5px;color:var(--t3);line-height:1.5}

/* ── MAP ── */
#map-pane{flex:1;min-width:0;position:relative;overflow:hidden}
#map{width:100%;height:100%}
.leaflet-container{background:#DDE8E2}
.leaflet-tile-pane{filter:saturate(.78) brightness(1.03)}
.leaflet-control-zoom{border:none!important;box-shadow:var(--sh2)!important;border-radius:12px!important;overflow:hidden!important}
.leaflet-control-zoom a{border:none!important;background:rgba(255,255,255,.95)!important;color:var(--g1)!important;width:32px!important;height:32px!important;line-height:32px!important;font-size:16px!important;font-weight:700!important}
.leaflet-control-zoom a:hover{background:var(--gp)!important}
.leaflet-popup-content-wrapper{border-radius:16px!important;box-shadow:0 12px 40px rgba(0,0,0,.15)!important;border:1px solid var(--bd)!important;padding:0!important;overflow:hidden!important}
.leaflet-popup-content{margin:0!important}
.popup-card{padding:13px 15px}
.popup-name{font-size:14px;font-weight:800;letter-spacing:-.03em;color:var(--t1);margin-bottom:2px}
.popup-count{font-size:11px;color:var(--t3);margin-bottom:10px}
.popup-btn{display:flex;align-items:center;justify-content:center;width:100%;padding:8px;border-radius:9px;background:var(--gg);color:#fff;font-size:12px;font-weight:700;border:none;cursor:pointer;font-family:inherit;box-shadow:0 4px 12px rgba(10,107,85,.25)}
.leaflet-popup-tip{background:rgba(255,255,255,.96)!important}
.leaflet-control-attribution{font-size:9px!important;opacity:.5!important;background:rgba(255,255,255,.8)!important}

/* Map hint */
#map-hint{
  position:absolute;bottom:20px;left:50%;transform:translateX(-50%);
  display:flex;align-items:center;gap:9px;padding:9px 17px 9px 12px;
  border-radius:99px;background:rgba(255,255,255,.92);backdrop-filter:blur(14px);
  border:1px solid var(--bd);color:var(--t2);font-size:12px;font-weight:600;
  box-shadow:var(--sh2);z-index:400;pointer-events:none;
  transition:opacity .3s,transform .3s;
}
.hint-anim{position:relative;width:24px;height:24px;flex-shrink:0}
.hint-pin{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:16px;z-index:2;animation:pinBounce 2s var(--spring) infinite}
@keyframes pinBounce{0%,100%{transform:none}45%{transform:translateY(-4px) scale(1.1)}}
.hint-r1,.hint-r2,.hint-r3{position:absolute;inset:0;border-radius:50%;border:2px solid rgba(14,148,112,.5);animation:ring 2.4s ease-out infinite}
.hint-r2{inset:-5px;border-color:rgba(14,148,112,.3);animation-delay:.4s}
.hint-r3{inset:-10px;border-color:rgba(14,148,112,.15);animation-delay:.8s}
@keyframes ring{0%{transform:scale(.4);opacity:1}100%{transform:scale(2);opacity:0}}

/* Province highlight */
.province-highlight{animation:pHL 2s ease-in-out infinite}
@keyframes pHL{0%,100%{stroke-opacity:.85;fill-opacity:.26}50%{stroke-opacity:.45;fill-opacity:.12}}

/* ── MOBILE BOTTOM BAR ── */
#mobile-bar{display:none}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   MOBILE PORTRAIT  ≤ 768px
   Clean single block — no overrides
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
@media(max-width:768px){

  /* Header: compact single row */
  #header{height:50px;min-height:50px;padding:0 12px;gap:8px}
  .logo-sub,.hd-sep,.search-wrap,.hd-stats,#saved-badge{display:none}
  .logo-mark{width:30px;height:30px;border-radius:9px}
  .logo-name{font-size:13px}

  /* Main: position:relative so sheets can float */
  #main{overflow:visible}

  /* Map: fills #main */
  #map-pane{
    position:absolute;
    top:0;left:0;right:0;
    bottom:calc(var(--mbar) + env(safe-area-inset-bottom));
  }

  /* ── SIDEBAR as bottom sheet ── */
  #sidebar{
    position:fixed;
    left:0;right:0;bottom:0;
    width:100%;min-width:unset;
    height:calc(65dvh + var(--mbar) + env(safe-area-inset-bottom));
    border-right:none;border-top:1px solid var(--bd);
    border-radius:22px 22px 0 0;
    box-shadow:0 -6px 24px rgba(0,0,0,.13);
    transform:translateY(calc(100% - var(--sb-peek) - var(--mbar) - env(safe-area-inset-bottom)));
    transition:transform .3s var(--ease);
    z-index:100;overflow:hidden;
    display:flex !important;
    flex-direction:column;
    padding-bottom:calc(var(--mbar) + env(safe-area-inset-bottom));
  }
  #sidebar.sheet-open{transform:translateY(0)}
  #sidebar.hidden{transform:translateY(110%) !important;pointer-events:none}

  /* Sidebar handle */
  .sb-header{cursor:pointer;flex-shrink:0;padding-top:7px}
  .sb-header::before{content:'';display:block;width:38px;height:4px;border-radius:99px;background:var(--bd2);margin:0 auto 8px}

  /* Province list scrolls inside sidebar sheet */
  #province-list{
    flex:1;min-height:0;
    overflow-y:scroll;-webkit-overflow-scrolling:touch;
  }

  /* ── RESOURCE PANEL as bottom sheet ── */
  #res-panel{
    position:fixed !important;
    left:0 !important;right:0 !important;bottom:0 !important;
    top:auto !important;
    width:100% !important;
    height:calc(78dvh + var(--mbar) + env(safe-area-inset-bottom)) !important;
    display:none;
    grid-template-rows:auto 1fr !important;
    border-right:none !important;border-top:1px solid var(--bd);
    border-radius:22px 22px 0 0;
    box-shadow:0 -8px 32px rgba(0,0,0,.15);
    z-index:110 !important;overflow:hidden;
    padding-bottom:calc(var(--mbar) + env(safe-area-inset-bottom));
    animation:sheetUp .3s var(--spring) both;
  }
  #res-panel.visible{display:grid !important}
  @keyframes sheetUp{from{transform:translateY(100%);opacity:.3}to{transform:none;opacity:1}}

  /* Panel handle */
  .rp-header{padding-top:7px;flex-shrink:0}
  .rp-header::before{content:'';display:block;width:38px;height:4px;border-radius:99px;background:var(--bd2);margin:0 auto 8px}
  .rp-title{font-size:14.5px}

  /* List fills the 1fr grid row — CSS handles scroll, NO JS needed */
  #res-list{
    overflow-y:scroll !important;
    -webkit-overflow-scrolling:touch;
    min-height:0 !important;
    /* DO NOT set height/max-height — grid 1fr handles it */
  }

  /* Map hint position */
  #map-hint{
    bottom:calc(var(--sb-peek) + var(--mbar) + env(safe-area-inset-bottom) + 12px);
    font-size:11px;padding:7px 13px 7px 10px;
  }

  /* Touch sizes */
  .prov-item{padding:12px 9px;min-height:44px}
  .btn-back{width:38px;height:38px}
  .res-row,.rc{border-radius:12px}

  /* Mobile bottom bar */
  #mobile-bar{
    display:flex;align-items:center;justify-content:space-around;
    position:fixed;bottom:0;left:0;right:0;z-index:200;
    background:rgba(255,255,255,.97);backdrop-filter:blur(20px);
    border-top:1px solid var(--bd);
    height:calc(var(--mbar) + env(safe-area-inset-bottom));
    padding-bottom:env(safe-area-inset-bottom);
  }
  .mb-btn{
    display:flex;flex-direction:column;align-items:center;gap:3px;
    padding:5px 18px;border-radius:10px;border:none;background:transparent;
    cursor:pointer;flex:1;font-family:inherit;min-height:44px;justify-content:center;
    transition:all .12s var(--ease);
  }
  .mb-btn:active{transform:scale(.9)}
  .mb-btn.active{background:var(--gp)}
  .mb-btn-icon{font-size:20px;line-height:1}
  .mb-btn-label{font-size:9px;font-weight:700;color:var(--t3);letter-spacing:.04em;text-transform:uppercase}
  .mb-btn.active .mb-btn-label{color:var(--g1)}
}

/* ── DESKTOP: push map when panel open ── */
@media(min-width:769px){
  #main.has-panel #map-pane{margin-left:300px}
  #map-pane{transition:margin-left .24s var(--ease)}
}

/* Loading screen */
#loading{position:fixed;inset:0;z-index:9999;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;transition:opacity .4s,transform .4s}
#loading.out{opacity:0;pointer-events:none;transform:scale(1.02)}
.ld-logo{width:60px;height:60px;border-radius:19px;background:var(--gg);display:flex;align-items:center;justify-content:center;box-shadow:var(--shg);animation:ldP 1.6s ease-in-out infinite}
.ld-logo svg{width:28px;height:28px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round}
@keyframes ldP{0%,100%{box-shadow:var(--shg),0 0 0 0 rgba(14,148,112,.3)}50%{box-shadow:0 14px 38px rgba(10,107,85,.38),0 0 0 10px rgba(14,148,112,0)}}
.ld-name{font-size:17px;font-weight:800;letter-spacing:-.04em;color:var(--t1)}
.ld-wave{display:flex;gap:5px;align-items:center;height:26px}
.ld-b{width:4px;border-radius:99px;background:var(--g3);animation:ldW 1.1s ease-in-out infinite}
.ld-b:nth-child(1){height:10px}.ld-b:nth-child(2){height:18px;animation-delay:.1s;background:var(--g2)}.ld-b:nth-child(3){height:22px;animation-delay:.2s;background:var(--g1)}.ld-b:nth-child(4){height:18px;animation-delay:.3s;background:var(--g2)}.ld-b:nth-child(5){height:10px;animation-delay:.4s}
@keyframes ldW{0%,100%{transform:scaleY(.5);opacity:.5}50%{transform:scaleY(1);opacity:1}}
</style>

// ── CATEGORIES ──
function getCat(n){
  n=(n||'').toLowerCase();
  if(/(hospital|salud|urgencias.*san|sanitari|sacyl|scs|samu|summa|061|osakidetza|infosalut|sos galicia|derivaci)/i.test(n))return'health';
  if(/(bombero)/i.test(n))return'fire';
  if(/(policía|policia|ertzaintza|mossos|guardia civil|udaltzain)/i.test(n))return'police';
  if(/(social|smus|saus|semas|samur social|serv.*mujer|igualdad|anar|oavd|víctima|victima|centro.*mujer)/i.test(n))return'social';
  if(/(fiscalía|juzgado|justicia|colegio oficial)/i.test(n))return'legal';
  if(/(esperanza|apoyo|emocional|psico|crisis|violencia|género|genero|caivs|urrats|dema)/i.test(n))return'crisis';
  return'default';
}
const EMOJI={health:'🏥',fire:'🚒',police:'🚔',social:'🤝',legal:'⚖️',crisis:'💚',default:'📞'};
const LABEL={health:'Salud',fire:'Bomberos',police:'Seguridad',social:'Social',legal:'Justicia',crisis:'Apoyo',default:'Otros'};

// ── STATE ──
const SKEY='recursos-v6';
let appData=null,selectedId=null,markers={},map=null;
let geojsonLayer=null,geojsonLayerMap={},highlightLayer=null;

// ── STORAGE ──
function loadData(){try{const s=localStorage.getItem(SKEY);appData=s?JSON.parse(s):JSON.parse(JSON.stringify(DEFAULT));}catch{appData=JSON.parse(JSON.stringify(DEFAULT));}}

// ── STATS ──
function updateStats(){
  const tot=appData.provincias.reduce((a,p)=>a+p.r.length,0)+appData.nacionales.length;
  document.getElementById('stat-prov').textContent=appData.provincias.length;
  document.getElementById('stat-rec').textContent=tot;
}

// ── ESCAPE ──
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

// ── PROVINCE LIST ──
function renderProvinceList(filter=''){
  const el=document.getElementById('province-list');
  const f=filter.toLowerCase().trim();
  let h='';
  h+=`<div class="prov-item nacionales${selectedId==='nacionales'?' active':''}" data-id="nacionales">
    <span class="prov-dot"></span><span class="prov-name">Nacionales</span>
    <span class="prov-count">${appData.nacionales.length}</span></div>`;
  h+=`<div class="sb-section">Provincias</div>`;
  appData.provincias.forEach(p=>{
    if(f&&!p.n.toLowerCase().includes(f))return;
    h+=`<div class="prov-item${selectedId===p.id?' active':''}" data-id="${p.id}">
      <span class="prov-dot"></span><span class="prov-name">${p.n}</span>
      <span class="prov-count">${p.r.length}</span></div>`;
  });
  el.innerHTML=h;
  el.querySelectorAll('.prov-item').forEach(x=>x.addEventListener('click',()=>selectProvince(x.dataset.id)));
}

// ── RESOURCE LIST ──
function renderResourceList(){
  const el=document.getElementById('res-list');
  const rows=selectedId==='nacionales'?appData.nacionales:(appData.provincias.find(p=>p.id===selectedId)?.r||[]);
  const counts={};
  rows.forEach(r=>{const c=getCat(r.s);counts[c]=(counts[c]||0)+1;});
  const order=['health','fire','police','social','legal','crisis','default'];
  let cats='';
  order.forEach(c=>{if(counts[c])cats+=`<span class="cat-tag cat-${c}">${EMOJI[c]} ${LABEL[c]}</span>`});
  document.getElementById('rp-cats').innerHTML=cats;
  if(!rows.length){
    el.innerHTML='<div class="empty-state"><div class="empty-ico">📋</div><div class="empty-t">Sin recursos</div></div>';
    return;
  }
  el.innerHTML=rows.map((r,i)=>{
    const cat=getCat(r.s);
    return`<div class="rc c-${cat}" style="animation-delay:${i*20}ms">
      <div class="rc-inner"><div class="rc-row">
        <div class="rc-ico c-${cat}">${EMOJI[cat]}</div>
        <div class="rc-body">
          <div class="rc-name">${esc(r.s)}</div>
          <div class="rc-phone">${esc(r.t)}</div>
          ${r.d?`<div class="rc-desc">${esc(r.d)}</div>`:''}
        </div>
      </div></div></div>`;
  }).join('');
}

// ── DESKTOP: fix list height via JS ──
function fixListHeightDesktop(){
  if(window.innerWidth<=768)return; // mobile: CSS grid handles it
  const list=document.getElementById('res-list');
  const rh=document.querySelector('.rp-header');
  if(!list||!rh)return;
  const vh=window.innerHeight;
  const headerH=document.getElementById('header')?.getBoundingClientRect().height||56;
  const rpH=rh.getBoundingClientRect().height;
  const h=Math.max(100,vh-headerH-rpH-6);
  list.style.height=h+'px';
}
window.addEventListener('resize',()=>{if(selectedId)fixListHeightDesktop();});

// ── SELECT PROVINCE ──
function selectProvince(id){
  selectedId=id;
  document.getElementById('sidebar').classList.add('hidden');
  document.getElementById('res-panel').classList.add('visible');
  document.getElementById('main').classList.add('has-panel');
  document.getElementById('rp-title').textContent=id==='nacionales'?'Teléfonos Nacionales':appData.provincias.find(p=>p.id===id)?.n||id;
  renderResourceList();
  renderProvinceList(document.getElementById('sb-search').value);
  // Desktop height fix (mobile handled by CSS grid)
  setTimeout(fixListHeightDesktop,50);
  setTimeout(fixListHeightDesktop,300);
  // Map
  if(id==='nacionales'){clearHighlight();}else{highlightProvince(id);}
  if(id!=='nacionales'&&PROVINCE_COORDS[id]&&map){
    map.flyTo(PROVINCE_COORDS[id],['laspalmas','tenerife','baleares'].includes(id)?8:8,{duration:.9});
  }else if(map){map.flyTo([40,-3.5],5,{duration:.8});}
  updateMarkers();
  document.getElementById('map-hint').style.opacity='0';
  if(window.innerWidth<=768){
    document.getElementById('sidebar').classList.remove('sheet-open');
    sheetOpen=false;
    document.querySelectorAll('.mb-btn').forEach(b=>b.classList.remove('active'));
    document.getElementById('mb-list')?.classList.add('active');
  }
}

// ── BACK ──
document.getElementById('btn-back').addEventListener('click',()=>{
  selectedId=null;
  clearHighlight();
  document.getElementById('res-panel').classList.remove('visible');
  document.getElementById('sidebar').classList.remove('hidden');
  document.getElementById('main').classList.remove('has-panel');
  document.getElementById('map-hint').style.opacity='1';
  renderProvinceList(document.getElementById('sb-search').value);
  updateMarkers();
  if(map)map.flyTo([40,-3.5],5,{duration:.8});
  if(window.innerWidth<=768){
    sheetOpen=false;
    document.getElementById('sidebar').classList.remove('sheet-open');
    document.querySelectorAll('.mb-btn').forEach(b=>b.classList.remove('active'));
    document.getElementById('mb-map')?.classList.add('active');
  }
});

// ── SEARCH ──
document.getElementById('sb-search').addEventListener('input',e=>renderProvinceList(e.target.value));
document.getElementById('global-search').addEventListener('input',e=>{
  document.getElementById('sb-search').value=e.target.value;
  renderProvinceList(e.target.value);
});

// ── MAP ──
function initMap(){
  map=L.map('map',{center:[40,-3.5],zoom:5,zoomControl:true,preferCanvas:true});
  const osm=L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',maxZoom:19,crossOrigin:true});
  const carto=L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{attribution:'© OSM © CARTO',subdomains:'abcd',maxZoom:19,crossOrigin:true});
  carto.addTo(map);
  carto.on('tileerror',()=>{if(!map.hasLayer(osm)){carto.remove();osm.addTo(map);}});
  addMarkers();
  setTimeout(tryLoadGeoJSON,800);
  [0,80,300,800].forEach(ms=>setTimeout(()=>map.invalidateSize({animate:false}),ms));
}

function mStyle(id){
  const sel=id===selectedId;
  const cnt=(appData.provincias.find(p=>p.id===id)?.r||[]).length;
  return{radius:sel?13:Math.max(6,Math.min(10,5+Math.floor(cnt/3))),fillColor:sel?'#0A6B55':cnt>12?'#0E9470':cnt>7?'#4DD6A8':'#9FE1CB',color:'#fff',weight:sel?3.5:1.8,opacity:1,fillOpacity:sel?.98:.82};
}
function addMarkers(){
  appData.provincias.forEach(p=>{
    const c=PROVINCE_COORDS[p.id];if(!c)return;
    const m=L.circleMarker(c,mStyle(p.id)).addTo(map);
    m.bindPopup(mkPopup(p),{maxWidth:210});
    m.on('click',()=>{m.closePopup();selectProvince(p.id);});
    m.on('mouseover',function(){this.openPopup();});
    m.on('mouseout',function(){this.closePopup();});
    markers[p.id]=m;
  });
}
function updateMarkers(){Object.entries(markers).forEach(([id,m])=>{m.setStyle(mStyle(id));const p=appData.provincias.find(p=>p.id===id);if(p)m.bindPopup(mkPopup(p),{maxWidth:210});});}
function mkPopup(p){
  const cc={};p.r.forEach(r=>{const c=getCat(r.s);cc[c]=(cc[c]||0)+1;});
  let b='';['health','fire','police','social','legal','crisis','default'].forEach(c=>{if(cc[c])b+=`<span class="cat-tag cat-${c}">${EMOJI[c]}</span>`;});
  return`<div class="popup-card"><div class="popup-name">${p.n}</div><div class="popup-count">${p.r.length} recurso${p.r.length!==1?'s':''}</div>${b?`<div style="display:flex;gap:3px;flex-wrap:wrap;margin-bottom:10px">${b}</div>`:''}<button class="popup-btn" onclick="selectProvince('${p.id}')">Ver recursos →</button></div>`;
}

// ── GEOJSON HIGHLIGHT ──
function clearHighlight(){
  if(highlightLayer){map.removeLayer(highlightLayer);highlightLayer=null;}
  if(geojsonLayer){geojsonLayer.eachLayer(l=>l.setStyle({color:'#6db5a0',weight:.6,opacity:.3,fillColor:'transparent',fillOpacity:0}));}
}
function applyGeoJSONHighlight(id){
  const l=geojsonLayerMap[id];if(!l||!geojsonLayer)return false;
  geojsonLayer.eachLayer(x=>x.setStyle({color:'#6db5a0',weight:.6,opacity:.3,fillColor:'transparent',fillOpacity:0}));
  l.setStyle({color:'#0A6B55',weight:2.5,opacity:1,fillColor:'#11A884',fillOpacity:.26,className:'province-highlight'});
  l.bringToFront();if(markers[id])markers[id].bringToFront();
  return true;
}
function highlightProvince(id){
  clearHighlight();
  if(!id||id==='nacionales'||!PROVINCE_COORDS[id])return;
  if(applyGeoJSONHighlight(id))return;
  const[lat,lng]=PROVINCE_COORDS[id];
  highlightLayer=L.circle([lat,lng],{radius:46000,color:'#0A6B55',weight:2.5,opacity:.85,fillColor:'#11A884',fillOpacity:.18,className:'province-highlight'}).addTo(map);
  highlightLayer.bringToFront();if(markers[id])markers[id].bringToFront();
}
function normalizeStr(s){return(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim();}
function setupGeoJSONLayer(data){
  if(!data||data.type==='Topology')return false;
  const features=data.features||[];if(!features.length)return false;
  geojsonLayer=L.geoJSON(features,{
    style:()=>({color:'#6db5a0',weight:.6,opacity:.3,fillColor:'transparent',fillOpacity:0}),
    onEachFeature(feature,layer){
      const id=feature.properties?.id||getProvinceIdFromGeoName(feature.properties?.name||'');
      if(id){layer._pid=id;geojsonLayerMap[id]=layer;}
      layer.on('click',()=>{if(id)selectProvince(id);});
      layer.on('mouseover',()=>{if(selectedId!==id)layer.setStyle({fillColor:'#D4F1E5',fillOpacity:.14,weight:1.5,opacity:.6});});
      layer.on('mouseout',()=>{if(selectedId!==id)layer.setStyle({color:'#6db5a0',weight:.6,opacity:.3,fillColor:'transparent',fillOpacity:0});});
    }
  }).addTo(map);
  geojsonLayer.bringToBack();
  if(selectedId&&selectedId!=='nacionales'){clearHighlight();applyGeoJSONHighlight(selectedId);}
  return Object.keys(geojsonLayerMap).length>0;
}
async function tryLoadGeoJSON(){
  const ok=setupGeoJSONLayer(EMBEDDED_GEOJSON);
}

// ── MOBILE SHEET ──
let sheetOpen=false;
document.getElementById('sb-handle').addEventListener('click',()=>{
  if(window.innerWidth>768)return;
  sheetOpen=!sheetOpen;
  document.getElementById('sidebar').classList.toggle('sheet-open',sheetOpen);
});
document.querySelector('.sb-search').addEventListener('focus',()=>{
  if(window.innerWidth<=768&&!sheetOpen){
    sheetOpen=true;
    document.getElementById('sidebar').classList.add('sheet-open');
  }
});

// ── MOBILE BOTTOM BAR ──
function mbSwitch(view){
  if(window.innerWidth>768)return;
  document.querySelectorAll('.mb-btn').forEach(b=>b.classList.remove('active'));
  if(view==='map'){
    document.getElementById('mb-map')?.classList.add('active');
    sheetOpen=false;
    document.getElementById('sidebar').classList.remove('sheet-open');
    if(selectedId){
      document.getElementById('res-panel').classList.remove('visible');
      document.getElementById('sidebar').classList.remove('hidden');
      document.getElementById('main').classList.remove('has-panel');
      selectedId=null;clearHighlight();updateMarkers();
      document.getElementById('map-hint').style.opacity='1';
    }
  }else if(view==='list'){
    document.getElementById('mb-list')?.classList.add('active');
    if(selectedId){
      document.getElementById('res-panel').classList.remove('visible');
      document.getElementById('sidebar').classList.remove('hidden');
      document.getElementById('main').classList.remove('has-panel');
      selectedId=null;clearHighlight();updateMarkers();
      renderProvinceList('');
      document.getElementById('map-hint').style.opacity='1';
    }
    sheetOpen=true;
    document.getElementById('sidebar').classList.add('sheet-open');
  }
}
